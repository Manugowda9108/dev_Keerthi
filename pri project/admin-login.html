<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>Admin Login - College Portal</title>
<link rel="stylesheet" href="style.css">
<script defer src="script.js"></script>
</head>

<body>

<header>
<h1>Mandavya First Grade College</h1>
<p>Admin Portal</p>
</header>



<div class="container" style="max-width:420px; margin:60px auto;">

<div class="login-card">
<h2>Admin Login</h2>

<form onsubmit="adminLogin(event)">

<div class="form-field">
  <label for="adminUsername">Username</label>
  <input type="text" id="adminUsername" placeholder="Enter admin username" required>
</div>

<div class="form-field">
  <label for="adminPassword">Password</label>
  <input type="password" id="adminPassword" placeholder="Enter admin password" required>
</div>

<div id="adminLoginError" style="color:#e84d60; margin:10px 0; display:none;"></div>

<button type="submit" style="width:100%; margin-top:10px;">Login</button>

</form>

<p style="text-align:center; margin-top:20px; font-size:12px; color:#666;">
Demo: Username: <strong>admin</strong> | Password: <strong>admin123</strong>
</p>

</div>

<div style="text-align:center; margin-top:30px;">
<a href="index.html" style="color:#0b3d91;">Back to Home</a>
</div>

</div>

</body>
</html>
