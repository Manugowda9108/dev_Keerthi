
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>Account Registration</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>Account Registration</h1>
</header>

<nav>
<a href="index.html">Home</a>
<a href="login.html">Login</a>
</nav>

<div class="container register-container">

<form onsubmit="registerStudent(event)">

<div class="form-errors" id="form-errors" role="alert" aria-live="polite"></div>

<div class="form-grid register-grid">
  <div class="form-field">
    <label for="name">Username</label>
    <input type="text" id="name" placeholder="Enter username" required>
    <small class="field-error" id="err-name"></small>
  </div>

  <div class="form-field">
    <label for="email">Email Address</label>
    <input type="email" id="email" placeholder="Enter email address" required>
    <small class="field-error" id="err-email"></small>
  </div>

  <div class="form-field">
    <label for="firstName">First Name</label>
    <input type="text" id="firstName" placeholder="Enter first name" required>
    <small class="field-error" id="err-firstName"></small>
  </div>

  <div class="form-field">
    <label for="lastName">Last Name</label>
    <input type="text" id="lastName" placeholder="Enter last name" required>
    <small class="field-error" id="err-lastName"></small>
  </div>

  <div class="form-field">
    <label for="phone">Phone Number</label>
    <input type="tel" id="phone" placeholder="10-digit mobile number" required>
    <small class="field-error" id="err-phone"></small>
  </div>

  <div class="form-field">
    <label for="password">Password</label>
    <input type="password" id="password" placeholder="Min 6 chars (letters + number)" required>
    <small class="field-error" id="err-password"></small>
  </div>

  <div class="form-field">
    <label for="confirmPassword">Confirm Password</label>
    <input type="password" id="confirmPassword" placeholder="Re-enter password" required>
    <small class="field-error" id="err-confirmPassword"></small>
  </div>
</div>

<button type="submit">Register</button>

</form>

</div>

<script src="script.js"></script>

</body>
</html>
